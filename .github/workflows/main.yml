name: RetailPulse CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Generate synthetic data for tests
      run: |
        python scripts/generate_data.py
        
    - name: Build Docker Image
      run: |
        docker build -t retailpulse-app .

  # For deploying to Kubernetes, we would add another job here
  # that logs into AWS/GCP, pushes the image to ECR/GCR,
  # and applies the k8s manifests.
